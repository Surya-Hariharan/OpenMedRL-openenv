---
# TriageRL Clinical Scenario Corpus
# ==================================
# 20 scenarios across 5 categories and 3 difficulty tiers.
#
# Categories : cardiovascular | neurological | infectious | respiratory | abdominal
# Difficulty  : easy | medium | hard
# ESI scale   : 1 (immediate) → 5 (non-urgent)
#
# Maintenance rules
# -----------------
# 1. Every trigger value must be one of: ask_history | check_vitals | examine_patient
# 2. Do NOT use "clarify" as a trigger — it is a sentinel, not a named layer.
# 3. vital_drift.per_step keys must match VitalSigns field names exactly.
# 4. initial_vitals keys must match VitalSigns field names exactly.
# 5. Run tests/tasks/test_loader.py after any edit to catch schema errors early.

tasks:

  # ───────────────────────────────────────────────────────────────
  # CARDIOVASCULAR  (4 tasks)
  # ───────────────────────────────────────────────────────────────

  - id: classic-stemi
    category: cardiovascular
    difficulty: easy
    esi_correct: 1
    chief_complaint: "crushing chest pain radiating to left arm, sweating"
    scenario: >-
      Textbook STEMI: 58-year-old male, hypotension, diaphoresis, tachycardia.
    initial_vitals:
      heart_rate: 112
      blood_pressure_systolic: 88
      blood_pressure_diastolic: 58
      respiratory_rate: 22
      oxygen_saturation: 93.0
      temperature: 37.1
      gcs: 15
    patient_info:
      patient_id: "cv-001"
      age: 58
      sex: male
      triage_arrival_mode: ambulance
      symptoms:
        - crushing chest pain
        - diaphoresis
        - nausea
        - left arm radiation
        - shortness of breath
      medical_history:
        - hypertension
        - type 2 diabetes
        - smoker 20 pack-years
      current_medications:
        - metformin 500mg
        - amlodipine 5mg
      allergies: []
      time_of_onset: "35 minutes ago, sudden onset"
    initial_labs: []
    hidden_info: []
    confounders:
      - "Patient reports 'indigestion' last week (red herring)"
    vital_drift:
      per_step:
        heart_rate: 8
        blood_pressure_systolic: -6
        oxygen_saturation: -1.5
      noise_sigma:
        heart_rate: 3.0
        blood_pressure_systolic: 4.0
        oxygen_saturation: 0.5
      starts_at_step: 1
    expected_clarify_steps: 0
    key_clarify_actions: []
    expected_actions:
      - "12-lead ECG immediately"
      - "IV access x2 large bore"
      - "aspirin 300mg PO"
      - "GTN if SBP >90"
      - "oxygen therapy if SpO2 <94"
      - "continuous cardiac monitoring"
      - "troponin and urgent bloods"
      - "activate cath lab / PCI team"
      - "morphine for pain"
      - "call senior cardiologist"
    key_reasoning_keywords:
      - stemi
      - myocardial infarction
      - st elevation
      - reperfusion
      - pci
      - cardiogenic shock
      - troponin
      - cardiac
      - ischaemia
    expected_severity: critical
    max_steps: 2
    undertriage_consequence: >-
      Delayed PCI increases infarct size exponentially; cardiogenic shock and
      death within 30-60 minutes.
    clinical_pearl: >-
      Door-to-balloon time <90 minutes is the gold standard.
      Every minute of delay = ~1 myocyte lost.
    why_difficulty: >-
      Textbook STEMI presentation — hypotension, tachycardia, diaphoresis,
      crushing chest pain with radiation. Classify immediately.

  - id: silent-nstemi-diabetic
    category: cardiovascular
    difficulty: medium
    esi_correct: 2
    chief_complaint: "feeling very tired and a bit short of breath since this morning"
    scenario: >-
      Diabetic neuropathy masking classic chest pain in NSTEMI;
      presents as fatigue only.
    initial_vitals:
      heart_rate: 98
      blood_pressure_systolic: 144
      blood_pressure_diastolic: 88
      respiratory_rate: 20
      oxygen_saturation: 95.0
      temperature: 37.0
      gcs: 15
    patient_info:
      patient_id: "cv-002"
      age: 67
      sex: female
      triage_arrival_mode: ambulatory
      symptoms:
        - fatigue
        - mild dyspnoea
        - nausea
        - dizziness on exertion
      medical_history:
        - type 2 diabetes 20 years
        - hypertension
        - chronic kidney disease stage 2
        - previous angina
      current_medications:
        - insulin glargine
        - metformin 1g
        - ramipril 5mg
        - aspirin 75mg
      allergies: []
      time_of_onset: "since this morning, ~6 hours"
    initial_labs: []
    hidden_info:
      - trigger: ask_history
        reveal_label: "Cardiac history detail"
        clinical_priority: 1
        data:
          chest_tightness: >-
            Patient admits 'a little tightness' if directly asked —
            diabetic neuropathy masks pain
          previous_angiogram: >-
            Angiogram 2 years ago showed moderate LAD stenosis, deferred stenting
          symptom_progression: >-
            Symptoms worsening over 6 hours, now short of breath at rest
      - trigger: check_vitals
        reveal_label: "Repeat vitals"
        clinical_priority: 2
        data:
          repeat_bp: "162/94 on second reading"
          ecg_rhythm: >-
            12-lead ECG: ST depression 1.5mm V4-V6, T-wave inversion lateral leads
    confounders:
      - "No chest pain (diabetic autonomic neuropathy masks ischaemic pain)"
      - "Fatigue attributed to poor diabetic control or anaemia"
      - "Looks 'well' — walking, talking, no acute distress"
      - "Previous angiogram 2 years ago reassures incorrectly"
    vital_drift:
      per_step:
        heart_rate: 4
        blood_pressure_systolic: -4
        oxygen_saturation: -0.8
      noise_sigma:
        heart_rate: 2.0
        blood_pressure_systolic: 5.0
        oxygen_saturation: 0.3
      starts_at_step: 2
    expected_clarify_steps: 2
    key_clarify_actions:
      - ask_history
      - check_vitals
    expected_actions:
      - "12-lead ECG urgently"
      - "serial troponins (0h and 3h)"
      - "IV access"
      - "continuous cardiac monitoring"
      - "aspirin 300mg loading dose"
      - "P2Y12 inhibitor (ticagrelor)"
      - "urgent cardiology review"
      - "check renal function before contrast"
    key_reasoning_keywords:
      - nstemi
      - silent ischaemia
      - diabetic
      - neuropathy
      - st depression
      - troponin
      - acs
      - lateral
      - angina
    expected_severity: high
    max_steps: 4
    undertriage_consequence: >-
      Missed NSTEMI sent to waiting room → arrhythmia, cardiac arrest in triage.
    clinical_pearl: >-
      Up to 30% of MI in diabetics are painless.
      Fatigue + dyspnoea in a diabetic patient = ACS until proven otherwise.
    why_difficulty: >-
      No chest pain, normal-ish vitals, looks well. Diabetic neuropathy is the
      key masking factor; direct questioning unlocks the diagnosis.

  - id: aortic-dissection-mimic
    category: cardiovascular
    difficulty: hard
    esi_correct: 1
    chief_complaint: "sudden severe back pain, 10/10, started one hour ago"
    scenario: >-
      Type A aortic dissection presenting as back pain;
      BP differential between arms is the diagnostic key.
    initial_vitals:
      heart_rate: 104
      blood_pressure_systolic: 148
      blood_pressure_diastolic: 92
      respiratory_rate: 18
      oxygen_saturation: 97.0
      temperature: 37.2
      gcs: 15
    patient_info:
      patient_id: "cv-003"
      age: 53
      sex: male
      triage_arrival_mode: ambulatory
      symptoms:
        - sudden severe back pain
        - tearing quality
        - radiates to chest
        - diaphoresis
        - anxiety
      medical_history:
        - hypertension poorly controlled
        - "Marfan syndrome features (tall, long arms, lens dislocation)"
      current_medications:
        - amlodipine 10mg
        - losartan 50mg
      allergies:
        - penicillin
      time_of_onset: "1 hour ago, sudden onset at rest"
    initial_labs: []
    hidden_info:
      - trigger: check_vitals
        reveal_label: "Bilateral BP measurement"
        clinical_priority: 1
        data:
          bp_differential: >-
            Right arm BP 148/92 — Left arm BP 96/58 — 52mmHg DIFFERENTIAL
            (pathognomonic)
          pulse_deficit: "Left radial pulse diminished compared to right"
      - trigger: ask_history
        reveal_label: "Character and radiation of pain"
        clinical_priority: 1
        data:
          pain_character: >-
            Patient describes 'tearing, ripping sensation' — moved from back
            to chest over minutes
          family_history: >-
            Father died of 'heart problem' age 48 (possibly aortic event)
    confounders:
      - "Back pain very common — musculoskeletal initially considered"
      - "SBP 148 appears 'controlled hypertension', masks dissection"
      - "No obvious ST changes on ECG (coronary ostia not involved)"
      - "Tall habitus, not noted unless specifically checked"
    vital_drift:
      per_step:
        heart_rate: 6
        blood_pressure_systolic: -8
        oxygen_saturation: -1.0
        gcs: -1
      noise_sigma:
        heart_rate: 4.0
        blood_pressure_systolic: 6.0
        gcs: 0.0
      starts_at_step: 1
    expected_clarify_steps: 1
    key_clarify_actions:
      - check_vitals
    expected_actions:
      - "bilateral BP measurement immediately"
      - "IV access x2"
      - "do NOT give thrombolytics"
      - "urgent CT aortogram"
      - "cardiothoracic surgery consult stat"
      - "IV labetalol for rate and BP control"
      - "nil by mouth"
      - "crossmatch 6 units"
      - "ICU bed"
    key_reasoning_keywords:
      - aortic dissection
      - type a
      - bp differential
      - tearing
      - marfan
      - aortogram
      - cardiothoracic
      - thrombolytics contraindicated
      - pulse deficit
    expected_severity: critical
    max_steps: 3
    undertriage_consequence: >-
      Type A dissection has 1-2% mortality per hour untreated.
      Thrombolytics given for 'STEMI mimic' = fatal haemorrhage.
    clinical_pearl: >-
      Always measure bilateral BPs in tearing back/chest pain.
      A >20mmHg differential is dissection until proven otherwise.
      Thrombolytics are absolutely contraindicated.
    why_difficulty: >-
      Mimics musculoskeletal back pain and even STEMI. The bilateral BP
      differential is only found if specifically sought. Marfan features
      require clinical suspicion.

  - id: acute-heart-failure-copd
    category: cardiovascular
    difficulty: hard
    esi_correct: 2
    chief_complaint: "can't breathe, worse over 3 days, known COPD"
    scenario: >-
      Acute decompensated heart failure masquerading as COPD exacerbation
      in a patient with both.
    initial_vitals:
      heart_rate: 108
      blood_pressure_systolic: 168
      blood_pressure_diastolic: 102
      respiratory_rate: 28
      oxygen_saturation: 88.0
      temperature: 37.3
      gcs: 14
    patient_info:
      patient_id: "cv-004"
      age: 72
      sex: male
      triage_arrival_mode: ambulance
      symptoms:
        - severe dyspnoea
        - "orthopnoea (sleeps upright)"
        - ankle swelling
        - productive cough
        - wheeze
      medical_history:
        - COPD GOLD III
        - ischaemic cardiomyopathy EF 35%
        - atrial fibrillation
        - previous MI x2
      current_medications:
        - furosemide 40mg OD
        - carvedilol 6.25mg BD
        - salbutamol inhaler
        - tiotropium
        - apixaban 5mg BD
        - spironolactone 25mg
      allergies: []
      time_of_onset: "3 days worsening, acute deterioration today"
    initial_labs: []
    hidden_info:
      - trigger: ask_history
        reveal_label: "Medication and weight history"
        clinical_priority: 1
        data:
          weight_gain: >-
            Patient gained 4kg in 5 days — was not weighing himself daily
            as instructed
          furosemide_adherence: >-
            Stopped furosemide 1 week ago because 'it makes me wet myself'
          bnp_context: >-
            Previous BNP 1200 when stable; suspect significantly elevated now
      - trigger: examine_patient
        reveal_label: "Clinical examination findings"
        clinical_priority: 1
        data:
          examination: >-
            Fine bibasal crackles to mid-zones, JVP elevated 5cm, pitting
            oedema to knees, S3 gallop present
          chest_xray_suggestion: >-
            CXR: bilateral infiltrates in bat-wing distribution, cardiomegaly,
            Kerley B lines
    confounders:
      - "Known COPD makes wheeze and dyspnoea 'expected'"
      - "Productive cough suggests infection/exacerbation"
      - "Beta-blocker (carvedilol) masks tachycardia from heart failure"
      - "Salbutamol for wheeze could worsen AF and heart failure"
    vital_drift:
      per_step:
        respiratory_rate: 3
        oxygen_saturation: -2.0
        gcs: -1
        heart_rate: 4
      noise_sigma:
        respiratory_rate: 1.0
        oxygen_saturation: 0.5
        heart_rate: 2.0
      starts_at_step: 1
    expected_clarify_steps: 2
    key_clarify_actions:
      - ask_history
      - examine_patient
    expected_actions:
      - "CPAP/NIV if SpO2 <90"
      - "IV furosemide 80mg stat"
      - "controlled oxygen (target SpO2 88-92 in COPD)"
      - "12-lead ECG"
      - "BNP and troponin"
      - "chest X-ray"
      - "avoid salbutamol nebuliser (worsens AF/HF)"
      - "cardiology and respiratory review"
      - "strict fluid balance"
      - "daily weights"
    key_reasoning_keywords:
      - acute heart failure
      - pulmonary oedema
      - copd
      - bnp
      - furosemide
      - carvedilol
      - masked tachycardia
      - bibasal crackles
      - orthopnoea
      - diuresis
    expected_severity: high
    max_steps: 4
    undertriage_consequence: >-
      Treating as COPD exacerbation (nebulisers, steroids) worsens heart
      failure. Missing diuretic non-compliance delays correct treatment.
    clinical_pearl: >-
      In dual COPD/heart failure, BNP and weight gain history discriminate.
      Carvedilol masks tachycardia. Target SpO2 88-92%, not 100%.
    why_difficulty: >-
      Two overlapping diagnoses, each masking the other's features.
      Beta-blocker blunts tachycardia. The treatment for COPD
      (salbutamol, steroids) worsens heart failure.

  # ───────────────────────────────────────────────────────────────
  # NEUROLOGICAL  (4 tasks)
  # ───────────────────────────────────────────────────────────────

  - id: meningococcal-meningitis
    category: neurological
    difficulty: medium
    esi_correct: 1
    chief_complaint: "worst headache of my life, fever, stiff neck"
    scenario: >-
      Bacterial meningitis with non-blanching petechial rash — classic
      presentation with a key diagnostic sign.
    initial_vitals:
      heart_rate: 118
      blood_pressure_systolic: 105
      blood_pressure_diastolic: 70
      respiratory_rate: 20
      oxygen_saturation: 98.0
      temperature: 39.4
      gcs: 14
    patient_info:
      patient_id: "neuro-001"
      age: 19
      sex: female
      triage_arrival_mode: ambulance
      symptoms:
        - thunderclap headache
        - high fever
        - neck stiffness
        - photophobia
        - vomiting
        - non-blanching petechial rash on legs
      medical_history:
        - no significant past history
      current_medications:
        - combined oral contraceptive pill
      allergies: []
      time_of_onset: "8 hours ago, rapidly worsening"
    initial_labs: []
    hidden_info:
      - trigger: examine_patient
        reveal_label: "Meningism signs"
        clinical_priority: 1
        data:
          kernig_sign: >-
            Kernig sign positive — pain and resistance on knee extension
            with hip flexed
          brudzinski_sign: >-
            Brudzinski sign positive — involuntary knee flexion on neck
            flexion
          rash_detail: >-
            Petechiae now spreading — some coalescing into purpura on thighs
    confounders:
      - "On contraceptive pill — could suggest migraine with aura"
      - "GCS 14 not critically low — might be reassuring"
      - "Young healthy patient — clinicians less alert"
    vital_drift:
      per_step:
        heart_rate: 5
        gcs: -1
        temperature: 0.3
        blood_pressure_systolic: -5
      noise_sigma:
        heart_rate: 2.0
        temperature: 0.1
        blood_pressure_systolic: 3.0
      starts_at_step: 2
    expected_clarify_steps: 1
    key_clarify_actions:
      - examine_patient
    expected_actions:
      - "immediate contact isolation"
      - "blood cultures x2 BEFORE antibiotics"
      - "IV ceftriaxone 2g STAT"
      - "IV dexamethasone"
      - "CT head if LP planned"
      - "lumbar puncture if CT clear"
      - "meningococcal public health notification"
      - "IV access and fluid resuscitation"
      - "neurology consult"
    key_reasoning_keywords:
      - meningitis
      - meningococcal
      - petechiae
      - non-blanching
      - kernig
      - brudzinski
      - ceftriaxone
      - lumbar puncture
      - bacterial
      - septicaemia
    expected_severity: critical
    max_steps: 3
    undertriage_consequence: >-
      Delayed antibiotics: every hour without ceftriaxone doubles mortality.
      Non-blanching rash = meningococcal septicaemia until proven otherwise.
    clinical_pearl: >-
      Antibiotics BEFORE LP if any delay. Non-blanching rash + meningism =
      ESI 1, no exceptions. Don't wait for CT results to start antibiotics.
    why_difficulty: >-
      Classic but high-stakes. Confounder is the OCP (migraine mimicry) and
      borderline GCS. Physical exam sign (rash spread) is the discriminator.

  - id: stroke-lacunar-subtle
    category: neurological
    difficulty: medium
    esi_correct: 2
    chief_complaint: "my face is drooping and my speech is funny, started 45 minutes ago"
    scenario: >-
      Acute ischaemic stroke within thrombolysis window —
      FAST positive, subtle motor deficit.
    initial_vitals:
      heart_rate: 84
      blood_pressure_systolic: 178
      blood_pressure_diastolic: 98
      respiratory_rate: 16
      oxygen_saturation: 97.0
      temperature: 37.0
      gcs: 14
    patient_info:
      patient_id: "neuro-002"
      age: 71
      sex: male
      triage_arrival_mode: ambulance
      symptoms:
        - "facial droop (right)"
        - slurred speech
        - mild right arm weakness
        - onset 45 minutes ago
      medical_history:
        - atrial fibrillation
        - hypertension
        - previous TIA 2 years ago
      current_medications:
        - apixaban 5mg BD
        - ramipril 10mg
        - atorvastatin 40mg
      allergies: []
      time_of_onset: "45 minutes ago, witnessed by wife"
    initial_labs: []
    hidden_info:
      - trigger: ask_history
        reveal_label: "Anticoagulation status"
        clinical_priority: 1
        data:
          last_apixaban_dose: >-
            Last apixaban taken 14 hours ago — needs anti-Xa level before
            thrombolysis decision
          nihss_detail: >-
            NIHSS score 6: facial palsy 2, arm drift 2, dysarthria 1,
            gaze deviation 1
          last_known_well: >-
            Wife confirms last seen normal 44 minutes ago — within 4.5hr window
    confounders:
      - "On apixaban — team may assume thrombolysis contraindicated without checking level"
      - "Previous TIA — symptoms might be 'another TIA'"
      - "BP 178/98 — team distracted by hypertension management"
    vital_drift:
      per_step:
        gcs: -1
        blood_pressure_systolic: 4
      noise_sigma:
        gcs: 0.0
        blood_pressure_systolic: 3.0
      starts_at_step: 2
    expected_clarify_steps: 1
    key_clarify_actions:
      - ask_history
    expected_actions:
      - "immediate stroke team activation (code stroke)"
      - "CT brain without contrast STAT"
      - "CT angiography head and neck"
      - "anti-Xa level for apixaban"
      - "blood glucose"
      - "12-lead ECG"
      - "IV access"
      - "do NOT lower BP aggressively (target <185/110 for thrombolysis)"
      - "alteplase if eligible and anti-Xa low"
      - "thrombectomy evaluation"
    key_reasoning_keywords:
      - stroke
      - tpa
      - alteplase
      - thrombolysis
      - nihss
      - fast
      - ischaemic
      - atrial fibrillation
      - thrombectomy
      - anti-xa
    expected_severity: high
    max_steps: 3
    undertriage_consequence: >-
      Window closes: every 30 minutes costs ~4.5 million neurons.
      Missing anti-Xa check leads to either missed thrombolysis or
      dangerous bleeding.
    clinical_pearl: >-
      Code stroke immediately on FAST positive.
      Anti-Xa level determines thrombolysis eligibility on apixaban.
      Time IS brain.
    why_difficulty: >-
      Anticoagulation status creates a genuine diagnostic dilemma.
      Previous TIA normalises symptoms.
      BP management instinct may delay thrombolysis.

  - id: subarachnoid-haemorrhage
    category: neurological
    difficulty: medium
    esi_correct: 1
    chief_complaint: "sudden thunderclap headache, worst in my life, at the gym"
    scenario: >-
      Subarachnoid haemorrhage — sentinel headache during exertion,
      normal initial neuro exam.
    initial_vitals:
      heart_rate: 96
      blood_pressure_systolic: 192
      blood_pressure_diastolic: 108
      respiratory_rate: 18
      oxygen_saturation: 99.0
      temperature: 37.1
      gcs: 15
    patient_info:
      patient_id: "neuro-003"
      age: 46
      sex: female
      triage_arrival_mode: ambulatory
      symptoms:
        - sudden thunderclap headache
        - nausea and vomiting
        - neck stiffness
        - photophobia
        - onset during exercise
      medical_history:
        - migraines
        - polycystic kidney disease
      current_medications:
        - sumatriptan PRN
        - combined oral contraceptive pill
      allergies: []
      time_of_onset: "2 hours ago during weightlifting"
    initial_labs: []
    hidden_info:
      - trigger: ask_history
        reveal_label: "Headache character"
        clinical_priority: 1
        data:
          headache_character: >-
            Unlike any previous migraine — instantaneous maximal intensity,
            'like being hit with a bat'
          previous_episodes: >-
            No similar episode in past. Previous migraines are gradual onset
            over 30 minutes
          family_history: >-
            Sister has polycystic kidney disease — associated with
            intracranial aneurysms
    confounders:
      - "History of migraines makes headache 'expected'"
      - "Normal GCS 15 — neurology appears intact"
      - "Normal oxygen, HR only mildly elevated"
      - "Polycystic kidney disease link to aneurysm not widely known"
    vital_drift:
      per_step:
        gcs: -1
        blood_pressure_systolic: 8
        heart_rate: 6
      noise_sigma:
        gcs: 0.0
        blood_pressure_systolic: 5.0
        heart_rate: 2.0
      starts_at_step: 2
    expected_clarify_steps: 1
    key_clarify_actions:
      - ask_history
    expected_actions:
      - "CT head without contrast STAT"
      - "LP at 12 hours if CT negative (xanthochromia)"
      - "IV access"
      - "nimodipine for vasospasm prevention"
      - "neurosurgery / interventional neuroradiology consult"
      - "CT angiography to locate aneurysm"
      - "strict bed rest"
      - "analgesia (avoid NSAIDs)"
    key_reasoning_keywords:
      - subarachnoid
      - sah
      - thunderclap
      - aneurysm
      - xanthochromia
      - nimodipine
      - lumbar puncture
      - polycystic kidney
      - sentinel headache
    expected_severity: critical
    max_steps: 3
    undertriage_consequence: >-
      Re-bleed within 24 hours has 70% mortality.
      Sent home as 'migraine' — dies from re-bleed.
    clinical_pearl: >-
      Thunderclap headache = SAH until CT + LP proven otherwise.
      Migraines build over minutes; SAH is instantaneous maximal intensity.
    why_difficulty: >-
      Migraine history normalises headache. Normal neuro exam and GCS
      reassuring. PKD-aneurysm link requires broad clinical knowledge.

  - id: subdural-elderly-fall
    category: neurological
    difficulty: hard
    esi_correct: 2
