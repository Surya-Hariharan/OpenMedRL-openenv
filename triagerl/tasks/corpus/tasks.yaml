      blood_pressure_diastolic: 88
      respiratory_rate: 17
      oxygen_saturation: 97.0
      temperature: 36.8
      gcs: 13
    patient_info:
      patient_id: "neuro-004"
      age: 84
      sex: female
      triage_arrival_mode: ambulance
      symptoms:
        - confusion
        - unsteady gait
        - "left-sided weakness (subtle)"
        - headache for 1 week
      medical_history:
        - atrial fibrillation
        - hypertension
        - previous ischaemic stroke
        - osteoporosis
      current_medications:
        - warfarin 5mg
        - amlodipine 5mg
        - donepezil 5mg
        - lansoprazole 15mg
      allergies: []
      time_of_onset: "found confused this morning; history of fall 10 days ago"
    initial_labs: []
    hidden_info:
      - trigger: ask_history
        reveal_label: "Fall history and anticoagulation"
        clinical_priority: 1
        data:
          inr_history: >-
            Last INR 4.2 two weeks ago — warfarin dose was increased.
            No recent check.
          fall_detail: >-
            Carer reports patient 'knocked head on bathroom floor' 10 days
            ago — no immediate symptoms
          cognitive_baseline: >-
