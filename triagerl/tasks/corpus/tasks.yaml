      Physostigmine given for anticholinergic signs — refractory seizures and asystole.
    clinical_pearl: >-
      TCA toxicity: QRS >100ms = sodium bicarbonate immediately. NOT QTc.
      Target arterial pH 7.45-7.55 — alkaline pH reduces TCA sodium channel binding.
      Physostigmine is absolutely contraindicated in TCA overdose.
    why_difficulty: >-
      QRS vs QTc confusion is a common and dangerous error. Physostigmine trap
