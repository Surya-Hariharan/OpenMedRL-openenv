name: triagerl
version: "0.1.0"
description: >
  TriagerL: an OpenEnv-style emergency department triage benchmark.
  Agents classify patient urgency using the Emergency Severity Index (ESI 1-5).
  The corpus contains procedurally varied clinical cases across multiple
  categories (cardiovascular, neurological, infectious, respiratory,
  abdominal/metabolic). Includes partial observability, stochastic
  deterioration, and a safety-weighted, multi-component reward.
author: "your-team-name"
tags:
  - openenv
  - medical
  - triage
  - clinical
  - healthcare
  - esi
  - real-world
tasks:
  - id: classic-stemi
    difficulty: easy
    description: "Classic STEMI with shock physiology"
  - id: meningococcal-meningitis
    difficulty: medium
    description: "Bacterial meningitis with non-blanching rash"
  - id: masked-urosepsis
    difficulty: hard
    description: "Atypical elderly sepsis masked by beta-blockade and CKD"
action_space:
  type: structured_json
  fields:
    - {name: action_type, type: string, values: [classify, clarify]}
    - {name: esi_level, type: integer, range: [1, 5]}
    - {name: clarifying_question, type: string}
    - {name: reasoning, type: string}
    - {name: recommended_actions, type: "list[string]"}
    - {name: confidence, type: float, range: [0.0, 1.0]}
observation_space:
  type: structured_json
  fields:
    - {name: task_id, type: string, description: "Opaque per-episode case reference"}
    - {name: patient, type: PatientPresentation}
    - {name: step_number, type: integer}
    - {name: phase, type: string, values: [assessment, intervention, classification, completed]}
    - {name: clarification_history, type: "list[string]"}
    - {name: additional_info_revealed, type: boolean}
    - {name: deterioration_signal, type: float}
reward_range: [-1.0, 1.0]
